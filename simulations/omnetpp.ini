*.node[*].appl.periodicEnabled = false
*.node[*].appl.bsmImpliedMode  = true
*.node[*].appl.useVoiObjectSelection = false

*.node[*].appl.greedyTickInterval = 0.1s
*.node[*].appl.greedyAlphaPos     = 1.0
*.node[*].appl.greedyAlphaSpeed   = 0.5
*.node[*].appl.greedyAlphaHeading = 0.1
*.node[*].appl.greedyW1           = 1.0
*.node[*].appl.greedyW2           = 0.5
*.node[*].appl.greedyW3           = 0.3
*.node[*].appl.greedyW4           = 0.5
*.node[*].appl.greedyThreshold    = 1.0
*.node[*].appl.greedyMinInterval  = 0.2s
*.node[*].appl.greedyMaxInterval  = 5.0s

*.node[*].appl.logPrefix = "GreedyBSMImplied"
output-scalar-file = GreedyBSMImplied-scalars.sca
output-vector-file = GreedyBSMImplied-vectors.vec


# =====================================================================
# New policy: Hybrid ETSI+VoI+Redundancy (SDSM object-level)
# =====================================================================
[Config HybridSDSM]
description = "Hybrid sender policy: self-change + object novelty + freshness - CBR, with VoI-ranked object selection and redundancy suppression"

*.node[*].appl.greedyEnabled   = false
*.node[*].appl.hybridEnabled   = true
*.node[*].appl.periodicEnabled = false
*.node[*].appl.bsmImpliedMode  = false
*.node[*].appl.useVoiObjectSelection = true

*.node[*].appl.greedyTickInterval = 0.1s
*.node[*].appl.greedyAlphaPos     = 1.0
*.node[*].appl.greedyAlphaSpeed   = 0.5
*.node[*].appl.greedyAlphaHeading = 0.1
*.node[*].appl.greedyMinInterval  = 0.2s
*.node[*].appl.greedyMaxInterval  = 5.0s
*.node[*].appl.redundancyEpsilon  = 0.5

*.node[*].appl.hybridThreshold    = 1.2
*.node[*].appl.hybridRedundancyWindow = 1.0s
*.node[*].appl.hybridWSelf        = 1.0
*.node[*].appl.hybridWTime        = 0.4
*.node[*].appl.hybridWCBR         = 0.4
*.node[*].appl.hybridWObj         = 0.6
*.node[*].appl.hybridVoiDistWeight = 0.6
*.node[*].appl.hybridVoiAgeWeight  = 0.3
*.node[*].appl.hybridVoiRelSpeedWeight = 0.1
*.node[*].appl.hybridMinVoi       = 0.05

*.node[*].appl.logPrefix = "HybridSDSM"
output-scalar-file = HybridSDSM-scalars.sca
output-vector-file = HybridSDSM-vectors.vec


# =====================================================================
# New policy: HybridSDSM v2 — full spatial-association + LARM + VoI pipeline.
# References:
#   - Allig & Wanielik, IEEE IV 2019 (spatial alignment)
#   - Rauch et al., IEEE IV 2012 (temporal prediction)
#   - Volk et al., IEEE IV 2019 (two-stage gating)
#   - Thandavarayan et al., JNCA 2023 (LARM redundancy)
#   - Lyu et al., IEEE VNC 2025 (VoI novelty + relative quality)
#   - ETSI TS 103 324 §6.1 trigger logic, TS 102 687 DCC suppressor
# =====================================================================
[Config HybridSDSM_v2]
description = "Hybrid v2: RX spatial association + LARM redundancy gate + VoI top-K + parallel-threshold OR trigger + per-object AoI"

*.node[*].appl.greedyEnabled        = false
*.node[*].appl.hybridEnabled        = true
*.node[*].appl.hybridVariant        = "v2"
*.node[*].appl.periodicEnabled      = false
*.node[*].appl.bsmImpliedMode       = false
*.node[*].appl.useVoiObjectSelection = false

# K_max=32; keep maxObjectsPerSdsm in sync so the packer cap doesn't clip it.
*.node[*].appl.maxObjectsPerSdsm    = 32
*.node[*].appl.K_max                = 32

# Tick interval (100 ms, same cadence as Greedy).
*.node[*].appl.greedyTickInterval   = 0.1s

# All other v2 knobs use their NED defaults (Part 6 of the brief); uncomment
# to override for sensitivity sweeps without a rebuild.
# *.node[*].appl.tau_self          = 0.4
# *.node[*].appl.tau_obj           = 0.4
# *.node[*].appl.tau_time          = 0.5
# *.node[*].appl.tau_cbr           = 0.6
# *.node[*].appl.w_novelty         = 0.5
# *.node[*].appl.w_quality         = 0.5
# *.node[*].appl.p_highConfidence  = 0.85
# *.node[*].appl.tau_conf          = 0.5
# *.node[*].appl.redundancyWindow  = 0.5s

*.node[*].appl.logPrefix = "HybridSDSM_v2"
output-scalar-file = HybridSDSM_v2-scalars.sca
output-vector-file = HybridSDSM_v2-vectors.vec


# =====================================================================
# New policy: Greedy_v2 — same parallel-threshold scheduler as HybridSDSM_v2,
# but distance-topK object selection (no VoI, no LARM, no spatial association).
# Purpose: isolate the scheduler change from the object-selection change, so
# the paper's HybridSDSM_v2 vs Greedy_v2 delta attributes cleanly to VoI+LARM.
# References (scheduler only): ETSI TS 103 324 §6.1 parallel triggers,
# ETSI TS 102 687 DCC suppressor.
# =====================================================================
[Config Greedy_v2]
description = "Greedy v2: ETSI parallel-threshold scheduler (shared with HybridSDSM_v2) + distance-topK object selection"

*.node[*].appl.greedyEnabled        = true
*.node[*].appl.hybridEnabled        = false
*.node[*].appl.greedyVariant        = "v2"
*.node[*].appl.periodicEnabled      = false
*.node[*].appl.bsmImpliedMode       = false
*.node[*].appl.useVoiObjectSelection = false

# Same payload cap as HybridSDSM_v2 so byte-length math is comparable.
*.node[*].appl.maxObjectsPerSdsm    = 32
*.node[*].appl.K_max                = 32

# Tick cadence matches HybridSDSM_v2.
*.node[*].appl.greedyTickInterval   = 0.1s

# All v2 scheduler thresholds use NED defaults (tau_self=0.4, tau_obj=0.4,
# tau_time=0.5, tau_cbr=0.6, T_max=5.0s). Override here for sweeps.

*.node[*].appl.logPrefix = "Greedy_v2"
output-scalar-file = Greedy_v2-scalars.sca
output-vector-file = Greedy_v2-vectors.vec


# =====================================================================
# New policy: EventTriggered_v2 — parallel-threshold scheduler with the
# time-based and CBR-based terms disabled, matching the spirit of the v1
# EventTriggered config (w2=w3=0). Self-change and object-set-change still
# trigger independently. Backstop is effectively disabled via T_max set so
# large that timeSinceSend_norm stays well below tau_time during a run.
# =====================================================================
[Config EventTriggered_v2]
description = "EventTriggered v2: parallel-threshold scheduler with AoI/CBR terms disabled (self + obj triggers only)"

*.node[*].appl.greedyEnabled        = true
*.node[*].appl.hybridEnabled        = false
*.node[*].appl.greedyVariant        = "v2"
*.node[*].appl.periodicEnabled      = false
*.node[*].appl.bsmImpliedMode       = false
*.node[*].appl.useVoiObjectSelection = false

*.node[*].appl.maxObjectsPerSdsm    = 32
*.node[*].appl.K_max                = 32
*.node[*].appl.greedyTickInterval   = 0.1s

# Disable the time and CBR terms by pushing their thresholds above achievable
# normalized values. T_max is set far above any expected run duration so
# timeSinceSend_norm stays near zero and the backstop never fires — equivalent
# to w2=w3=0 in the legacy utility form. Capped at 1e6s because simtime_t has
# a finite range (~9.2e6s at scale-exponent -12); 1e6s is 11.6 days, safely
# larger than any simulated scenario.
*.node[*].appl.tau_time             = 1e9
*.node[*].appl.tau_cbr              = 1.01
*.node[*].appl.T_max                = 1e6s

*.node[*].appl.logPrefix = "EventTriggered_v2"
*.node[*].appl.rxLogEveryNth = 2
output-scalar-file = EventTriggered_v2-scalars.sca
output-vector-file = EventTriggered_v2-vectors.vec


# =====================================================================
# New policy: GreedyBSMImplied_v2 — Greedy_v2 scheduler + no object list
# (bsmImpliedMode=true). Isolates the cost/benefit of carrying the object
# list under the v2 scheduler.
# =====================================================================
[Config GreedyBSMImplied_v2]
description = "GreedyBSMImplied v2: parallel-threshold scheduler + BSM-implied payload (no object list)"

*.node[*].appl.greedyEnabled        = true
*.node[*].appl.hybridEnabled        = false
*.node[*].appl.greedyVariant        = "v2"
*.node[*].appl.periodicEnabled      = false
*.node[*].appl.bsmImpliedMode       = true
*.node[*].appl.useVoiObjectSelection = false

*.node[*].appl.maxObjectsPerSdsm    = 32
*.node[*].appl.K_max                = 32
*.node[*].appl.greedyTickInterval   = 0.1s

*.node[*].appl.logPrefix = "GreedyBSMImplied_v2"
output-scalar-file = GreedyBSMImplied_v2-scalars.sca
output-vector-file = GreedyBSMImplied_v2-vectors.vec


